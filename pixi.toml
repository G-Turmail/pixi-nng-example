[workspace]
authors = ["Gabriel Turmail <g.turmail@imagingengineeringllc.com>"]
channels = ["conda-forge"]
name = "pixi-nng-example"
platforms = ["win-64"]
version = "0.1.0"

[tasks]
configure = {
    cmd = [
        "cmake",
        "-G", "Ninja",
        "-S", ".",
        "-B", ".build",
    ]
}
build = { cmd = ["ninja", "-C", ".build"], depends-on = ["configure"] }

[dependencies]
ninja = ">=1.13.2,<2"
cmake = ">=4.3.1,<5"
nng = ">=1.11,<2"
cxx-compiler = ">=1.11.0,<2"